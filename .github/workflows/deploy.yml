name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy static site
    runs-on: ubuntu-latest
    timeout-minutes: 30

    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint TypeScript and React
        run: npm run lint

      - name: Lint styles
        run: npm run lint:css

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm test -- --runInBand

      - name: Build static export
        run: npm run build

      - name: Verify static export
        run: |
          test -d out
          test -s out/index.html
          test "$(find out -type f | wc -l)" -gt 0

      - name: Install FTP client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends lftp

      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
          FTP_PROTOCOL: ${{ secrets.FTP_PROTOCOL || 'ftp' }}
        run: |
          set -e

          test -n "$FTP_SERVER"
          test -n "$FTP_USERNAME"
          test -n "$FTP_PASSWORD"
          test -n "$FTP_REMOTE_DIR"

          PORT="${FTP_PORT:-21}"

          lftp <<EOF
          set cmd:fail-exit yes

          set net:max-retries 2
          set net:timeout 20
          set net:reconnect-interval-base 5

          set ftp:ssl-allow true
          set ssl:verify-certificate false

          set ftp:list-options -a

          open -u "$FTP_USERNAME","$FTP_PASSWORD" \
            -p "$PORT" \
            "$FTP_PROTOCOL://$FTP_SERVER"

          cd "$FTP_REMOTE_DIR"

          mirror --reverse \
            --delete \
            --verbose \
            --parallel=2 \
            --exclude-glob ".git*" \
            --exclude-glob ".github*" \
            --exclude-glob ".env*" \
            --exclude-glob "node_modules/**" \
            --exclude-glob ".next/**" \
            --exclude-glob "*.log" \
            out/ .

          bye
          EOF

      - name: Health check
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          test -n "$APP_URL"

          curl \
            --fail \
            --silent \
            --show-error \
            --max-time 20 \
            "$APP_URL" > /dev/null
