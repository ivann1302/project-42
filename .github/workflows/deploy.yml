name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy Node static site
    runs-on: ubuntu-latest
    timeout-minutes: 30

    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint TypeScript and React
        run: npm run lint

      - name: Lint styles
        run: npm run lint:css

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm test -- --runInBand

      - name: Build static export
        run: npm run build:static

      - name: Verify static export and Node server files
        run: |
          test -d out
          test -s out/index.html
          test -s out/sitemap.xml
          test -s server/static-server.mjs
          test -s server/contact-handler.mjs
          test "$(find out -type f | wc -l)" -gt 0

      - name: Package release
        run: |
          tar -czf project42-node-release.tar.gz out server package.json

      - name: Configure SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || vars.SSH_PORT || '22' }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
        run: |
          set -e

          if [ -z "$SSH_HOST" ]; then
            echo "::error::SSH_HOST is empty. Add SSH_HOST as a GitHub Actions secret or variable."
            exit 1
          fi

          if [ -z "$SSH_PRIVATE_KEY" ] && [ -z "$SSH_PRIVATE_KEY_B64" ]; then
            echo "::error::SSH_PRIVATE_KEY or SSH_PRIVATE_KEY_B64 is empty. Add the private SSH key as a GitHub Actions secret."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [ -n "$SSH_PRIVATE_KEY_B64" ]; then
            printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 --decode > ~/.ssh/id_project42
          else
            printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_project42
          fi

          chmod 600 ~/.ssh/id_project42

          if ! ssh-keygen -y -f ~/.ssh/id_project42 > /dev/null; then
            echo "::error::Deploy SSH key is not a valid unencrypted private key. Prefer SSH_PRIVATE_KEY_B64: base64 -w0 ~/.ssh/project42_github_actions"
            exit 1
          fi

          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload release archive
        env:
          SSH_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || vars.SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.SSH_USER || vars.SSH_USER }}
          RELEASE_ARCHIVE: project42-node-release-${{ github.sha }}.tar.gz
        run: |
          set -e

          if [ -z "$SSH_USER" ]; then
            echo "::error::SSH_USER is empty. Add SSH_USER as a GitHub Actions secret or variable."
            exit 1
          fi

          cp project42-node-release.tar.gz "$RELEASE_ARCHIVE"
          scp \
            -i ~/.ssh/id_project42 \
            -P "$SSH_PORT" \
            "$RELEASE_ARCHIVE" \
            "$SSH_USER@$SSH_HOST:/tmp/$RELEASE_ARCHIVE"

      - name: Activate release on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || vars.SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.SSH_USER || vars.SSH_USER }}
          NODE_APP_DIR: ${{ secrets.NODE_APP_DIR || vars.NODE_APP_DIR }}
          NODE_APP_NAME: ${{ secrets.NODE_APP_NAME || vars.NODE_APP_NAME || 'project42' }}
          NODE_APP_PORT: ${{ secrets.NODE_APP_PORT || vars.NODE_APP_PORT || '3000' }}
          RELEASE_ARCHIVE: project42-node-release-${{ github.sha }}.tar.gz
        run: |
          set -e

          if [ -z "$NODE_APP_DIR" ]; then
            echo "::error::NODE_APP_DIR is empty. Add NODE_APP_DIR as a GitHub Actions secret or variable."
            exit 1
          fi

          ssh \
            -i ~/.ssh/id_project42 \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "APP_DIR='$NODE_APP_DIR' APP_NAME='$NODE_APP_NAME' APP_PORT='$NODE_APP_PORT' RELEASE_ARCHIVE='/tmp/$RELEASE_ARCHIVE' bash -s" <<'EOF'
          set -euo pipefail

          NODE_BIN="$(command -v node22 || true)"
          if [ -z "$NODE_BIN" ]; then
            echo "node22 was not found on the server"
            exit 1
          fi

          if [ ! -f "$APP_DIR/.env" ]; then
            echo "Missing $APP_DIR/.env"
            exit 1
          fi

          RELEASE_ID="$(date +%Y%m%d%H%M%S)"
          RELEASE_DIR="$APP_DIR/releases/$RELEASE_ID"
          CURRENT_DIR="$APP_DIR/current"

          mkdir -p "$APP_DIR/releases"
          mkdir -p "$RELEASE_DIR"

          tar -xzf "$RELEASE_ARCHIVE" -C "$RELEASE_DIR"
          ln -sfn "$APP_DIR/.env" "$RELEASE_DIR/.env"
          ln -sfn "$RELEASE_DIR" "$CURRENT_DIR"

          export HOSTNAME=127.0.0.1
          export PORT="$APP_PORT"
          export NODE_ENV=production

          if command -v pm2 >/dev/null 2>&1; then
            if pm2 describe "$APP_NAME" >/dev/null 2>&1; then
              pm2 restart "$APP_NAME" --update-env
            else
              cd "$CURRENT_DIR"
              pm2 start server/static-server.mjs \
                --name "$APP_NAME" \
                --interpreter "$NODE_BIN" \
                --time
            fi
            pm2 save || true
          else
            if [ -f "$APP_DIR/app.pid" ]; then
              kill "$(cat "$APP_DIR/app.pid")" 2>/dev/null || true
            fi

            cd "$CURRENT_DIR"
            nohup "$NODE_BIN" server/static-server.mjs > "$APP_DIR/app.log" 2>&1 &
            echo $! > "$APP_DIR/app.pid"
          fi

          sleep 2
          if ! curl --fail --silent --show-error --max-time 20 "http://127.0.0.1:$APP_PORT/__health" > /dev/null; then
            echo "Local health check failed. Response headers from port $APP_PORT:"
            curl -I --max-time 20 "http://127.0.0.1:$APP_PORT/__health" || true
            echo "Known project process state:"
            if command -v pm2 >/dev/null 2>&1; then
              pm2 describe "$APP_NAME" || true
            fi
            if [ -f "$APP_DIR/app.pid" ]; then
              echo "app.pid=$(cat "$APP_DIR/app.pid")"
            fi
            exit 1
          fi

          rm -f "$RELEASE_ARCHIVE"
          find "$APP_DIR/releases" -mindepth 1 -maxdepth 1 -type d | sort | head -n -5 | xargs -r rm -rf
          EOF

      - name: External health check
        env:
          APP_URL: ${{ secrets.APP_URL || vars.APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "APP_URL is not set; skipping external health check."
            exit 0
          fi

          curl \
            --fail \
            --silent \
            --show-error \
            --max-time 20 \
            "$APP_URL" > /dev/null || {
              echo "::warning::External health check failed for $APP_URL. Check DNS/domain/proxy settings."
            }
